<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>RandomAyah</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.jpg">
</head>
<body>
    <h1>RandomAyah</h1>
    <div id="ayah-container">
        <div id="ayahtext-container">
            <h2 id="ayah">
                وَقُل رَّبِّ زِدْنِي عِلْمًا
            </h2>
        </div>
        <div id="surah-ditail-container">
            <h3 id="surah">Taa-Haa</h3>
            <h3 id="ayahindex">114</h3>
        </div>
    </div>
    <br>
    <div id="language-container">
    <label for="language-select">Language:</label>

    <select id="language-select">
        <option value="quran-simple">عربي</option>
        <option value="en.sahih">English</option>
        <option value="fa.fooladvand">فارسی</option>
    </select>
    </div>
    <div id="buttons-container">
        <button id="new-ayah-button" onclick="RandomAyah()">New Ayah</button>
    </div>

    <h2>The Best Developer</h2>

    <a href="https://github.com/SleepKnight8" class="logo" target="_blank">
        SleepKnight8
    </a>

    <script src="index.js"></script>
</body>
</html>
